<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Bekir Eren Keskin</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <script>
    try { document.documentElement.setAttribute('data-tema', localStorage.getItem('bek-tema') || 'acik'); } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caprasimo:wght@400&family=Figtree:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .notfound {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 24px; gap: 18px;
    }
    .notfound-frame {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 28px 34px; background: #241f1b;
      border-radius: 4px; transform: rotate(-2deg);
      box-shadow: var(--shadow-lg);
    }
    .notfound-frame .film-meta {
      width: 100%; color: #ffc6a5; font-size: 11px; font-weight: 700;
      letter-spacing: .16em; margin: 0 0 6px;
    }
    .notfound-num {
      font-family: var(--font-heading); font-weight: 400; color: #f5ead8;
      font-size: clamp(3.5rem, 14vw, 7rem); line-height: 1; letter-spacing: -.02em;
    }
    .notfound h1 {
      margin: 6px 0 0; font-family: var(--font-heading); font-weight: 400;
      font-size: clamp(1.6rem, 4vw, 2.2rem); color: var(--color-text);
    }
    .notfound p { max-width: 46ch; font-size: 15.5px; line-height: 1.6; color: var(--color-neutral-700); margin: 0; }
    .notfound-back {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 6px;
      padding: 11px 24px; border-radius: 999px; text-decoration: none;
      background: var(--color-accent); color: var(--color-bg); font-weight: 600;
      transition: background .2s ease;
    }
    .notfound-back:hover { background: var(--color-accent-600); }
  </style>
</head>
<body>
  <div class="notfound">
    <div class="notfound-frame">
      <div class="film-meta"><span>ESTE 400</span></div>
      <div class="notfound-num">404</div>
    </div>
    <h1>Bu kare kayıp.</h1>
    <p>Aradığın sayfa ya hiç çekilmedi ya da filmde bir yerlerde kayboldu. Ana sayfaya dönüp oradan devam edebilirsin.</p>
    <a class="notfound-back" href="/">← Ana sayfaya dön</a>
  </div>
</body>
</html>
